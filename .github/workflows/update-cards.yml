name: Refresh live profile signals

on:
  schedule:
    # 02:13 Beijing time (18:13 UTC) every day
    - cron: "13 18 * * *"
  workflow_dispatch:

concurrency:
  group: profile-signal-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily GitHub data cards
        run: python3 scripts/gen_cards.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats-overview.svg assets/stats-languages.svg assets/activity-graph.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh live profile signals [skip ci]"
            git push
          fi
