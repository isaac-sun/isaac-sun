name: Generate Stats Cards

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/stats-cards.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate stats SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          token = os.environ["GITHUB_TOKEN"]
          user = "isaac-sun"

          def gh(path: str):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "github-stats-action",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def gh_safe(path: str, default=None):
              try:
                  return gh(path)
              except urllib.error.HTTPError as e:
                  print(f"warn: failed {path}: {e.code}")
                  return default

          u = gh(f"/users/{user}")
          repos = []
          page = 1
          while True:
              batch = gh(f"/users/{user}/repos?per_page=100&type=owner&page={page}")
              if not batch:
                  break
              repos.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          public_repos = u.get("public_repos", 0)
          followers = u.get("followers", 0)
          total_stars = sum((r.get("stargazers_count") or 0) for r in repos if not r.get("fork"))
          total_forks = sum((r.get("forks_count") or 0) for r in repos if not r.get("fork"))

          # Prefer actual language bytes from /languages instead of repository size.
          # Fall back to primary language + repo size if rate-limited.
          lang_bytes = {}
          used_language_api = 0
          for r in repos:
              if r.get("fork") or r.get("archived"):
                  continue
              name = r.get("name")
              if not name:
                  continue
              langs = gh_safe(f"/repos/{user}/{name}/languages", default=None)
              if isinstance(langs, dict) and langs:
                  used_language_api += 1
                  for lang, nbytes in langs.items():
                      lang_bytes[lang] = lang_bytes.get(lang, 0) + int(nbytes or 0)
                  continue
              primary = r.get("language")
              if primary:
                  lang_bytes[primary] = lang_bytes.get(primary, 0) + max(int(r.get("size") or 0), 1)

          top_langs = sorted(lang_bytes.items(), key=lambda x: -x[1])[:6]
          total_bytes = sum(v for _, v in top_langs) or 1

          colors = {
              "Python": "#3572A5",
              "JavaScript": "#f1e05a",
              "TypeScript": "#3178c6",
              "C": "#555555",
              "C++": "#f34b7d",
              "Java": "#b07219",
              "Haskell": "#5e5086",
              "SQL": "#e38c00",
              "HTML": "#e34c26",
              "CSS": "#563d7c",
              "Vue": "#41b883",
              "Dockerfile": "#384d54",
              "Shell": "#89e051",
              "Jupyter Notebook": "#DA5B0B",
              "TeX": "#3D6117",
              "Assembly": "#6E4C13",
              "Makefile": "#427819",
              "Rust": "#dea584",
              "Go": "#00ADD8",
              "Ruby": "#701516",
              "PHP": "#4F5D95",
              "Swift": "#F05138",
              "Kotlin": "#A97BFF",
              "Dart": "#00B4AB",
              "Scala": "#c22d40",
              "Markdown": "#083fa1",
          }

          GREEN = "#38BDF8"
          TEXT = "#E2E8F0"
          SUBTLE = "#94A3B8"
          BORDER = "#334155"
          CARD_W = 495
          CARD_H = 200
          RADIUS = 14

          def svg_card(w, h, body):
              return f'''<svg xmlns="http://www.w3.org/2000/svg" width="{w}" height="{h}" viewBox="0 0 {w} {h}">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="{w}" height="{h}" rx="{RADIUS}" fill="url(#bg)" stroke="{BORDER}" stroke-width="1"/>
{body}
</svg>'''

          # --- OVERVIEW STATS CARD ---
          items = [
              ("Repos", str(public_repos)),
              ("Stars", str(total_stars)),
              ("Followers", str(followers)),
              ("Forks", str(total_forks)),
          ]
          box_w = 100
          start_x = (CARD_W - len(items) * box_w) // 2
          body_parts = []
          body_parts.append(f'<text x="24" y="36" font-size="15" font-weight="700" fill="{GREEN}" font-family="ui-sans-serif,system-ui,sans-serif">GitHub Stats</text>')
          body_parts.append(f'<text x="24" y="56" font-size="12" fill="{SUBTLE}" font-family="ui-sans-serif,system-ui,sans-serif">@{user}</text>')
          for i, (label, value) in enumerate(items):
              x = start_x + i * box_w + box_w // 2
              body_parts.append(f'<text x="{x}" y="118" text-anchor="middle" font-size="28" font-weight="800" fill="{TEXT}" font-family="ui-sans-serif,system-ui,sans-serif">{value}</text>')
              body_parts.append(f'<text x="{x}" y="142" text-anchor="middle" font-size="12" fill="{SUBTLE}" font-family="ui-sans-serif,system-ui,sans-serif">{label}</text>')

          score = public_repos * 2 + total_stars
          level = "A+" if score > 50 else "A" if score > 20 else "B+" if score > 10 else "B"
          body_parts.append(f'<rect x="24" y="162" width="72" height="24" rx="12" fill="{GREEN}" fill-opacity="0.12" stroke="{GREEN}" stroke-opacity="0.4" stroke-width="1"/>')
          body_parts.append(f'<text x="60" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="{GREEN}" font-family="ui-sans-serif,system-ui,sans-serif">Rank {level}</text>')
          body_parts.append(f'<text x="{CARD_W - 24}" y="178" text-anchor="end" font-size="11" fill="{SUBTLE}" font-family="ui-sans-serif,system-ui,sans-serif">updated daily</text>')

          # --- TOP LANGUAGES CARD ---
          # Layout fix: language name on the left, bar in the middle, percent on the right.
          # Previous version overlapped labels with bars.
          n = max(len(top_langs), 1)
          row_h = 28
          header_h = 72
          card_h2 = max(180, header_h + n * row_h + 28)
          body2 = []
          body2.append(f'<text x="24" y="36" font-size="15" font-weight="700" fill="{GREEN}" font-family="ui-sans-serif,system-ui,sans-serif">Top Languages</text>')
          body2.append(f'<text x="24" y="56" font-size="12" fill="{SUBTLE}" font-family="ui-sans-serif,system-ui,sans-serif">by source bytes · public repos</text>')

          label_x = 24
          bar_x = 168
          bar_max_w = 232
          pct_x = CARD_W - 24
          bar_h = 10
          y0 = 84

          if not top_langs:
              body2.append(f'<text x="24" y="110" font-size="13" fill="{SUBTLE}" font-family="ui-sans-serif,system-ui,sans-serif">No language data yet</text>')
          else:
              for i, (lang, b) in enumerate(top_langs):
                  pct = b / total_bytes
                  y = y0 + i * row_h
                  color = colors.get(lang, "#94A3B8")
                  bw = max(bar_max_w * pct, 6)
                  # track
                  body2.append(f'<rect x="{bar_x}" y="{y}" width="{bar_max_w}" height="{bar_h}" rx="5" fill="#1E293B"/>')
                  # value
                  body2.append(f'<rect x="{bar_x}" y="{y}" width="{bw:.2f}" height="{bar_h}" rx="5" fill="{color}"/>')
                  body2.append(f'<text x="{label_x}" y="{y + 9}" font-size="13" fill="{TEXT}" font-family="ui-sans-serif,system-ui,sans-serif">{lang}</text>')
                  body2.append(f'<text x="{pct_x}" y="{y + 9}" text-anchor="end" font-size="12" fill="{SUBTLE}" font-family="ui-sans-serif,system-ui,sans-serif">{pct * 100:.1f}%</text>')

          out_dir = Path("generated-stats")
          out_dir.mkdir(exist_ok=True)
          (out_dir / "stats-overview.svg").write_text(svg_card(CARD_W, CARD_H, "\n".join(body_parts)), encoding="utf-8")
          (out_dir / "stats-languages.svg").write_text(svg_card(CARD_W, card_h2, "\n".join(body2)), encoding="utf-8")

          print("✅ Generated stats-overview.svg and stats-languages.svg")
          print(f"   Repos: {public_repos}, Stars: {total_stars}, Followers: {followers}, Forks: {total_forks}")
          print(f"   Languages from /languages API: {used_language_api}")
          print(f"   Top languages: {top_langs}")
          PYEOF

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./generated-stats
          publish_branch: output
          force_orphan: true
          enable_jekyll: true
