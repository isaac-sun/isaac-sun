<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="isaac-sun@github cyber terminal">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#06101f"/>
      <stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1628" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#07101d" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="35%" stop-color="#4ade80"/>
      <stop offset="70%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="name" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="30%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="55%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hex" width="28" height="48" patternUnits="userSpaceOnUse">
      <path d="M14 2 L26 10 L26 26 L14 34 L2 26 L2 10 Z" fill="none" stroke="#67e8f9" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="circuit" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M0 20 H30 M50 20 H80 M40 0 V30 M40 50 V80" fill="none" stroke="#4ade80" stroke-opacity="0.06" stroke-width="1"/>
      <circle cx="30" cy="20" r="2" fill="#4ade80" fill-opacity="0.18"/>
      <circle cx="50" cy="20" r="2" fill="#22d3ee" fill-opacity="0.18"/>
      <circle cx="40" cy="30" r="2" fill="#a78bfa" fill-opacity="0.16"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect x="28" y="22" width="1144" height="296" rx="16"/>
    </clipPath>
  </defs>

  <!-- Outer shell -->
  <rect width="1200" height="340" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="18" fill="url(#orb1)"/>
  <rect width="1200" height="340" rx="18" fill="url(#orb2)"/>
  <rect width="1200" height="340" rx="18" fill="url(#orb3)"/>
  <rect width="1200" height="340" rx="18" fill="url(#hex)"/>
  <rect width="1200" height="340" rx="18" fill="url(#circuit)"/>

  <!-- Neon border -->
  <rect x="2" y="2" width="1196" height="336" rx="18" fill="none" stroke="url(#neon)" stroke-opacity="0.55" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="324" rx="15" fill="none" stroke="#22d3ee" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Terminal panel -->
  <rect x="28" y="22" width="1144" height="296" rx="16" fill="url(#panel)" stroke="#1f2a44" stroke-width="1"/>

  <!-- Scanline sweep -->
  <g clip-path="url(#frame)">
    <rect x="28" y="-60" width="1144" height="50" fill="url(#scan)">
      <animate attributeName="y" values="-60;320;-60" dur="4.8s" repeatCount="indefinite"/>
    </rect>
    <!-- subtle horizontal scanlines -->
    <g opacity="0.05">
      <line x1="28" y1="70" x2="1172" y2="70" stroke="#67e8f9"/>
      <line x1="28" y1="110" x2="1172" y2="110" stroke="#67e8f9"/>
      <line x1="28" y1="150" x2="1172" y2="150" stroke="#67e8f9"/>
      <line x1="28" y1="190" x2="1172" y2="190" stroke="#67e8f9"/>
      <line x1="28" y1="230" x2="1172" y2="230" stroke="#67e8f9"/>
      <line x1="28" y1="270" x2="1172" y2="270" stroke="#67e8f9"/>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="28" y="22" width="1144" height="44" rx="16" fill="#0a1424"/>
  <rect x="28" y="50" width="1144" height="16" fill="#0a1424"/>
  <line x1="28" y1="66" x2="1172" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="56" cy="44" r="6" fill="#ff5f57"/>
  <circle cx="78" cy="44" r="6" fill="#febc2e"/>
  <circle cx="100" cy="44" r="6" fill="#28c840"/>
  <circle cx="56" cy="44" r="9" fill="#ff5f57" opacity="0.18"/>
  <circle cx="78" cy="44" r="9" fill="#febc2e" opacity="0.16"/>
  <circle cx="100" cy="44" r="9" fill="#28c840" opacity="0.16"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="13" fill="#94a3b8" font-family="'JetBrains Mono','Fira Code','SF Mono',monospace" letter-spacing="1.5">NEURAL SHELL // isaac-sun@github // v2.0.26</text>

  <!-- Corner HUD marks -->
  <path d="M48 86 H78 M48 86 V116" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="1.5" fill="none"/>
  <path d="M1152 86 H1122 M1152 86 V116" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="1.5" fill="none"/>
  <path d="M48 296 H78 M48 296 V266" stroke="#4ade80" stroke-opacity="0.45" stroke-width="1.5" fill="none"/>
  <path d="M1152 296 H1122 M1152 296 V266" stroke="#f472b6" stroke-opacity="0.45" stroke-width="1.5" fill="none"/>

  <!-- Right side HUD ring -->
  <g transform="translate(980, 175)">
    <circle r="78" fill="none" stroke="#1e293b" stroke-width="8"/>
    <circle r="78" fill="none" stroke="url(#neon)" stroke-width="3" stroke-dasharray="28 18" stroke-linecap="round" filter="url(#soft)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle r="58" fill="none" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="6 10">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle r="36" fill="#04101c" stroke="#4ade80" stroke-opacity="0.45" stroke-width="1.5"/>
    <text text-anchor="middle" y="6" font-size="18" font-weight="700" fill="#4ade80" font-family="'JetBrains Mono','Fira Code',monospace" filter="url(#glow)">YS</text>
    <text text-anchor="middle" y="28" font-size="10" fill="#67e8f9" font-family="'JetBrains Mono','Fira Code',monospace" letter-spacing="1">ONLINE</text>
  </g>

  <!-- Login meta -->
  <text x="64" y="100" font-size="12" fill="#64748b" font-family="'JetBrains Mono','Fira Code',monospace">session://secure · node=ningbo · channel=github</text>

  <!-- Prompt -->
  <text x="64" y="136" font-size="16" fill="#4ade80" font-family="'JetBrains Mono','Fira Code',monospace" font-weight="700" filter="url(#glow)">❯</text>
  <text x="88" y="136" font-size="16" fill="#e2e8f0" font-family="'JetBrains Mono','Fira Code',monospace">whoami --verbose --neon</text>

  <!-- Name -->
  <text x="64" y="188" font-size="42" font-weight="800" fill="url(#name)" font-family="'Segoe UI','Inter',system-ui,sans-serif" filter="url(#glow)">Yinan SUN</text>
  <text x="360" y="188" font-size="15" fill="#94a3b8" font-family="'JetBrains Mono','Fira Code',monospace">// CS + AI · UNNC · Ningbo</text>

  <!-- Neon tags -->
  <g transform="translate(64, 214)" font-family="'JetBrains Mono','Fira Code',monospace">
    <rect x="0" y="0" width="150" height="28" rx="8" fill="#4ade80" fill-opacity="0.10" stroke="#4ade80" stroke-opacity="0.55"/>
    <text x="75" y="18" text-anchor="middle" font-size="12" fill="#4ade80">Federated Learning</text>

    <rect x="160" y="0" width="108" height="28" rx="8" fill="#22d3ee" fill-opacity="0.10" stroke="#22d3ee" stroke-opacity="0.55"/>
    <text x="214" y="18" text-anchor="middle" font-size="12" fill="#22d3ee">AI Systems</text>

    <rect x="278" y="0" width="150" height="28" rx="8" fill="#a78bfa" fill-opacity="0.10" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text x="353" y="18" text-anchor="middle" font-size="12" fill="#c4b5fd">Full-Stack Eng</text>

    <rect x="438" y="0" width="150" height="28" rx="8" fill="#f472b6" fill-opacity="0.10" stroke="#f472b6" stroke-opacity="0.55"/>
    <text x="513" y="18" text-anchor="middle" font-size="12" fill="#f9a8d4">Model Optimization</text>
  </g>

  <!-- Status -->
  <circle cx="72" cy="274" r="5" fill="#4ade80" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="88" y="278" font-size="13" fill="#94a3b8" font-family="'JetBrains Mono','Fira Code',monospace">STATUS // OPEN · internship &amp; research collaboration</text>

  <!-- Bottom prompt + cursor -->
  <text x="64" y="308" font-size="15" fill="#22d3ee" font-family="'JetBrains Mono','Fira Code',monospace" font-weight="700" filter="url(#glow)">❯</text>
  <rect x="88" y="294" width="9" height="16" rx="1" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.15;1" dur="0.95s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="860" cy="110" r="2" fill="#22d3ee">
    <animate attributeName="cy" values="110;95;110" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="250" r="2" fill="#a78bfa">
    <animate attributeName="cy" values="250;235;250" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="150" r="2" fill="#4ade80">
    <animate attributeName="cy" values="150;135;150" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
