<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="isaac-sun@github">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#4ade80" fill-opacity="0.08"/>
    </pattern>
    <!-- Orb gradient -->
    <radialGradient id="orbGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)" rx="16"/>
  <rect width="1200" height="320" fill="url(#grid)" rx="16"/>
  <rect width="1200" height="320" fill="url(#dotGrid)" rx="16"/>

  <!-- Ambient orbs -->
  <ellipse cx="200" cy="80" rx="300" ry="200" fill="url(#orbGreen)"/>
  <ellipse cx="1000" cy="240" rx="350" ry="180" fill="url(#orbBlue)"/>

  <!-- Terminal window frame -->
  <rect x="30" y="20" width="1140" height="280" fill="#0d1117" fill-opacity="0.85" rx="12" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="30" y="20" width="1140" height="42" fill="#161b22" rx="12"/>
  <rect x="30" y="48" width="1140" height="14" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="56" cy="41" r="6" fill="#ff5f57"/>
  <circle cx="78" cy="41" r="6" fill="#febc2e"/>
  <circle cx="100" cy="41" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="600" y="45" text-anchor="middle" font-size="12" fill="#8b949e" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" letter-spacing="0.5">isaac-sun@github:~ — bash — 80×24</text>

  <!-- Divider -->
  <line x1="30" y1="62" x2="1170" y2="62" stroke="#21262d" stroke-width="1"/>

  <!-- Login info -->
  <text x="64" y="94" font-size="12" fill="#6e7681" font-family="'SF Mono','Fira Code',monospace">Last login: Tue Jul  1 2026 · ttys001</text>

  <!-- Prompt -->
  <text x="64" y="130" font-size="15" fill="#4ade80" font-family="'SF Mono','Fira Code',monospace" font-weight="600" filter="url(#softGlow)">❯</text>
  <text x="84" y="130" font-size="15" fill="#e6edf3" font-family="'SF Mono','Fira Code',monospace">whoami --verbose</text>

  <!-- Name -->
  <text x="64" y="178" font-size="36" font-weight="800" fill="url(#nameGrad)" font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif" filter="url(#neonGlow)">Yinan SUN</text>
  <text x="340" y="178" font-size="16" fill="#8b949e" font-family="'SF Mono','Fira Code',monospace">// CS + AI @ UNNC · Ningbo, China</text>

  <!-- Tags -->
  <g transform="translate(64, 205)">
    <rect x="0" y="0" width="130" height="24" rx="6" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="65" y="16" text-anchor="middle" font-size="11" fill="#4ade80" font-family="'SF Mono','Fira Code',monospace" font-weight="500">Federated Learning</text>

    <rect x="138" y="0" width="90" height="24" rx="6" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="183" y="16" text-anchor="middle" font-size="11" fill="#22d3ee" font-family="'SF Mono','Fira Code',monospace" font-weight="500">AI Systems</text>

    <rect x="236" y="0" width="140" height="24" rx="6" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="306" y="16" text-anchor="middle" font-size="11" fill="#818cf8" font-family="'SF Mono','Fira Code',monospace" font-weight="500">Full-Stack Engineering</text>

    <rect x="384" y="0" width="145" height="24" rx="6" fill="#f472b6" fill-opacity="0.12" stroke="#f472b6" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="456" y="16" text-anchor="middle" font-size="11" fill="#f472b6" font-family="'SF Mono','Fira Code',monospace" font-weight="500">Human-Centered Design</text>
  </g>

  <!-- Status indicator -->
  <text x="64" y="258" font-size="13" fill="#3fb950" font-family="'SF Mono','Fira Code',monospace" font-weight="600">●</text>
  <text x="86" y="258" font-size="12" fill="#8b949e" font-family="'SF Mono','Fira Code',monospace">status=OPEN · Open to internship &amp; research collaboration</text>

  <!-- Bottom prompt -->
  <text x="64" y="286" font-size="15" fill="#4ade80" font-family="'SF Mono','Fira Code',monospace" font-weight="600" filter="url(#softGlow)">❯</text>
  <rect x="86" y="271" width="8" height="17" fill="#4ade80" opacity="0.9" rx="1">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
