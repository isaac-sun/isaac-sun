<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yinan SUN — CS &amp; AI">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="18" fill="url(#grid)" opacity="0.55"/>
  <circle cx="1040" cy="40" r="120" fill="url(#glow)" filter="url(#soft)"/>
  <circle cx="180" cy="250" r="90" fill="url(#glow)" filter="url(#soft)" opacity="0.7"/>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- left accent rail -->
  <rect x="0" y="0" width="6" height="280" fill="url(#accent)"/>

  <!-- status pill -->
  <rect x="56" y="42" width="248" height="32" rx="16" fill="#0B1220" stroke="#334155" stroke-width="1"/>
  <circle cx="78" cy="58" r="5" fill="#34D399"/>
  <text x="94" y="63" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#94A3B8">Open to research &amp; internships</text>

  <!-- name -->
  <text x="56" y="128" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="48" font-weight="700" fill="#F8FAFC">Yinan SUN</text>
  <text x="56" y="168" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" fill="#94A3B8">Computer Science with Artificial Intelligence</text>

  <!-- tags -->
  <rect x="56" y="196" width="188" height="30" rx="8" fill="#0B1220" stroke="#1E293B"/>
  <text x="150" y="216" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#E2E8F0">Federated Learning</text>

  <rect x="256" y="196" width="126" height="30" rx="8" fill="#0B1220" stroke="#1E293B"/>
  <text x="319" y="216" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#E2E8F0">AI Systems</text>

  <rect x="394" y="196" width="132" height="30" rx="8" fill="#0B1220" stroke="#1E293B"/>
  <text x="460" y="216" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#E2E8F0">Full-Stack</text>

  <rect x="538" y="196" width="168" height="30" rx="8" fill="#0B1220" stroke="#1E293B"/>
  <text x="622" y="216" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#E2E8F0">UNNC · Ningbo, China</text>

  <!-- right monogram -->
  <rect x="980" y="88" width="140" height="140" rx="28" fill="#0B1220" stroke="url(#accent)" stroke-width="2"/>
  <text x="1050" y="172" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="url(#accent)">YS</text>
</svg>
