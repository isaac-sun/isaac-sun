<svg width="700" height="90" viewBox="0 0 700 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dev quote">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101f"/>
      <stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="700" height="90" rx="14" fill="url(#bg)" stroke="url(#neon)" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="28" y="40" font-family="Georgia,serif" font-size="16" fill="#e2e8f0" font-style="italic">"Talk is cheap. Show me the code."</text>
  <text x="28" y="66" font-family="'JetBrains Mono',monospace" font-size="12" fill="#4ade80">— Linus Torvalds</text>
</svg>
