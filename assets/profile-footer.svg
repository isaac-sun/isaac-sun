<svg width="1200" height="72" viewBox="0 0 1200 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal exit footer">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="72" fill="url(#footerBg)" rx="10"/>

  <!-- Top accent line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Decorative dots -->
  <circle cx="20" cy="12" r="2" fill="#4ade80" fill-opacity="0.4"/>
  <circle cx="32" cy="12" r="2" fill="#22d3ee" fill-opacity="0.3"/>
  <circle cx="44" cy="12" r="2" fill="#818cf8" fill-opacity="0.3"/>

  <!-- Prompt -->
  <text x="44" y="32" font-size="14" fill="#4ade80" font-family="'SF Mono','Fira Code',monospace" font-weight="600">❯</text>
  <text x="66" y="32" font-size="14" fill="#e6edf3" font-family="'SF Mono','Fira Code',monospace">exit 0</text>

  <!-- Message -->
  <text x="44" y="56" font-size="11" fill="#6e7681" font-family="'SF Mono','Fira Code',monospace">[Process completed with exit code 0]  ·  Keep building. Keep shipping. 🚀</text>

  <!-- Right side decoration -->
  <text x="1120" y="32" font-size="11" fill="#30363d" font-family="'SF Mono','Fira Code',monospace">EOF</text>
</svg>
