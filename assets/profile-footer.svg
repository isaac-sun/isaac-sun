<svg width="1200" height="88" viewBox="0 0 1200 88" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cyber terminal footer">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="88" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="86" rx="14" fill="none" stroke="url(#neon)" stroke-opacity="0.45" stroke-width="1.5"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#neon)" opacity="0.85"/>

  <!-- left signal -->
  <circle cx="36" cy="28" r="4" fill="#4ade80" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="52" cy="28" r="4" fill="#22d3ee" opacity="0.8"/>
  <circle cx="68" cy="28" r="4" fill="#a78bfa" opacity="0.8"/>

  <text x="36" y="56" font-size="15" fill="#4ade80" font-family="'JetBrains Mono','Fira Code',monospace" font-weight="700" filter="url(#glow)">❯</text>
  <text x="58" y="56" font-size="15" fill="#e2e8f0" font-family="'JetBrains Mono','Fira Code',monospace">exit 0</text>
  <text x="150" y="56" font-size="13" fill="#94a3b8" font-family="'JetBrains Mono','Fira Code',monospace">// process complete · keep building · keep shipping</text>

  <text x="1164" y="56" text-anchor="end" font-size="12" fill="#64748b" font-family="'JetBrains Mono','Fira Code',monospace" letter-spacing="2">EOF_</text>
  <rect x="1168" y="44" width="8" height="14" rx="1" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.15;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
